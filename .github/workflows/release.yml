name: release

on:
  push:
    tags:
      - "v*"

jobs:
  windows:
    runs-on: windows-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: package
        shell: pwsh
        run: ./scripts/package-windows.ps1

      - name: verify package
        shell: pwsh
        run: ./scripts/verify-package.ps1

      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dbyte-holyc-tools-windows
          path: dist/dbyte-holyc-tools-windows/
