  <path class="wire" d="M248 267 H318" />
  <path class="wire" d="M508 267 H578" />
  <path class="wire" d="M768 267 H838" />
  <path class="drop" d="M413 396 V460" />
  <path class="drop" d="M673 396 V460" />
  <path class="drop" d="M963 396 V460" />
</svg>
