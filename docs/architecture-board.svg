<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="560" viewBox="0 0 1180 560" role="img" aria-labelledby="title desc">
  <title id="title">DBYTE HOLYC TOOLS architecture board</title>
  <desc id="desc">Minimal architecture board for the DBYTE HOLYC TOOLS read-only archaeology pipeline.</desc>
  <defs>
    <style>
      .bg { fill: #101418; }
      .frame { fill: #0b0f12; stroke: #d6dde6; stroke-width: 2; }
      .box { fill: #111820; stroke: #d6dde6; stroke-width: 2; }
      .green { fill: #132018; stroke: #d6dde6; stroke-width: 2; }
      .brown { fill: #201a13; stroke: #d6dde6; stroke-width: 2; }
      .wire { stroke: #d6dde6; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .drop { stroke: #7f8a96; stroke-width: 2; fill: none; marker-end: url(#arrow-soft); }
      .title { fill: #f2f6fa; font-family: Consolas, 'Courier New', monospace; font-size: 24px; font-weight: 700; }
      .head { fill: #f2f6fa; font-family: Consolas, 'Courier New', monospace; font-size: 17px; font-weight: 700; }
      .txt { fill: #ccd5df; font-family: Consolas, 'Courier New', monospace; font-size: 14px; }
      .muted { fill: #8d98a5; font-family: Consolas, 'Courier New', monospace; font-size: 13px; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#d6dde6" />
    </marker>
    <marker id="arrow-soft" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L8,3 z" fill="#7f8a96" />
    </marker>
  </defs>

  <rect class="bg" width="1180" height="560" />
  <rect class="frame" x="28" y="28" width="1124" height="504" />

  <text class="title" x="52" y="68">DBYTE HOLYC TOOLS - ARCHITECTURE</text>
  <text class="muted" x="52" y="94">read-only source archaeology</text>

  <rect class="box" x="58" y="132" width="190" height="210" />
  <text class="head" x="78" y="164">source trees</text>
  <text class="txt" x="78" y="198">TempleOS</text>
  <text class="txt" x="78" y="228">LoseThos</text>
  <text class="txt" x="78" y="258">SparrowOS</text>

  <rect class="box" x="318" y="132" width="190" height="210" />
  <text class="head" x="338" y="164">scan core</text>
  <text class="txt" x="338" y="198">holylex</text>
  <text class="txt" x="338" y="228">holyindex</text>

  <rect class="green" x="578" y="132" width="190" height="210" />
  <text class="head" x="598" y="164">cli layer</text>
  <text class="txt" x="598" y="198">holytools.exe</text>
  <text class="txt" x="598" y="228">source map</text>
  <text class="txt" x="598" y="258">oracle lab</text>

  <rect class="green" x="838" y="132" width="250" height="210" />
  <text class="head" x="858" y="164">report pass</text>
  <text class="txt" x="858" y="198">run-archaeology.ps1</text>
  <text class="txt" x="858" y="228">contract reports</text>
  <text class="txt" x="858" y="258">findings summary</text>

  <rect class="brown" x="218" y="402" width="742" height="74" />
  <text class="head" x="238" y="434">outputs</text>
  <text class="txt" x="238" y="460">SUMMARY.md   source-map.json   include-resolve.md   REVERSE.md</text>

  <text class="muted" x="52" y="510">no rewrite. no formatter. reports only.</text>

  <path class="wire" d="M248 237 H318" />
  <path class="wire" d="M508 237 H578" />
  <path class="wire" d="M768 237 H838" />
  <path class="drop" d="M413 342 V402" />
  <path class="drop" d="M673 342 V402" />
  <path class="drop" d="M963 342 V402" />
</svg>
