<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">DBYTE HOLYC TOOLS architecture</title>
  <desc id="desc">Read-only architecture diagram for HolyC source scanning, archaeology reporting, target-specific TempleOS and LoseThos reports, and oracle random text lab.</desc>
  <defs>
    <style>
      .bg { fill: #0b0f14; }
      .panel { fill: #121923; stroke: #344255; stroke-width: 2; rx: 18; }
      .box { fill: #172232; stroke: #5b6f89; stroke-width: 2; rx: 14; }
      .target { fill: #182c24; stroke: #4d8067; stroke-width: 2; rx: 14; }
      .output { fill: #2a2138; stroke: #8064a6; stroke-width: 2; rx: 14; }
      .guard { fill: #33241b; stroke: #a8744f; stroke-width: 2; rx: 14; }
      .text { fill: #e8edf3; font-family: Consolas, Menlo, monospace; font-size: 22px; }
      .small { fill: #c2ccd8; font-family: Consolas, Menlo, monospace; font-size: 17px; }
      .tiny { fill: #9eabba; font-family: Consolas, Menlo, monospace; font-size: 14px; }
      .title { fill: #ffffff; font-family: Consolas, Menlo, monospace; font-size: 34px; font-weight: 700; }
      .line { stroke: #91a7bf; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .dashed { stroke: #91a7bf; stroke-width: 2.5; stroke-dasharray: 9 7; fill: none; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#91a7bf" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1280" height="760" />
  <text class="title" x="40" y="56">DBYTE HOLYC TOOLS — read-only source archaeology</text>
  <text class="small" x="42" y="88">No source rewrite. No VM. No fake C parser. Reports are evidence maps, not runtime proof.</text>

  <rect class="panel" x="35" y="120" width="285" height="500" />
  <text class="text" x="58" y="158">Source targets</text>
  <rect class="target" x="60" y="185" width="235" height="72" />
  <text class="small" x="80" y="214">TempleOS tree</text>
  <text class="tiny" x="80" y="238">*.HC / *.HH layout</text>
  <rect class="target" x="60" y="280" width="235" height="88" />
  <text class="small" x="80" y="310">LoseThos tree</text>
  <text class="tiny" x="80" y="334">legacy aliases</text>
  <text class="tiny" x="80" y="356">*.CPZ *.HPZ *.ASZ *.MPZ</text>
  <rect class="target" x="60" y="392" width="235" height="72" />
  <text class="small" x="80" y="421">SparrowOS tree</text>
  <text class="tiny" x="80" y="445">contrast target</text>
  <rect class="guard" x="60" y="496" width="235" height="84" />
  <text class="small" x="80" y="525">Source boundary</text>
  <text class="tiny" x="80" y="549">read only</text>
  <text class="tiny" x="80" y="571">no mutation / no execution</text>

  <rect class="panel" x="365" y="120" width="310" height="500" />
  <text class="text" x="390" y="158">Core scanner</text>
  <rect class="box" x="395" y="185" width="250" height="82" />
  <text class="small" x="418" y="215">holylex</text>
  <text class="tiny" x="418" y="239">tokens, strings, comments</text>
  <rect class="box" x="395" y="295" width="250" height="92" />
  <text class="small" x="418" y="325">holyindex</text>
  <text class="tiny" x="418" y="349">files, symbols, classes</text>
  <text class="tiny" x="418" y="371">includes, asm blocks</text>
  <rect class="box" x="395" y="418" width="250" height="108" />
  <text class="small" x="418" y="448">holytools.exe</text>
  <text class="tiny" x="418" y="472">source-map / symbols</text>
  <text class="tiny" x="418" y="494">resolve-includes</text>
  <text class="tiny" x="418" y="516">entrypoints / reverse</text>

  <rect class="panel" x="720" y="120" width="250" height="500" />
  <text class="text" x="745" y="158">Report scripts</text>
  <rect class="box" x="750" y="185" width="190" height="72" />
  <text class="small" x="772" y="214">report.ps1</text>
  <text class="tiny" x="772" y="238">base report pack</text>
  <rect class="box" x="750" y="280" width="190" height="86" />
  <text class="small" x="772" y="310">run-archaeology</text>
  <text class="tiny" x="772" y="334">multi-target</text>
  <text class="tiny" x="772" y="354">pipeline gate</text>
  <rect class="box" x="750" y="394" width="190" height="92" />
  <text class="small" x="772" y="424">contract reports</text>
  <text class="tiny" x="772" y="448">TempleOS-specific</text>
  <text class="tiny" x="772" y="470">LoseThos-specific</text>
  <rect class="guard" x="750" y="516" width="190" height="64" />
  <text class="small" x="772" y="546">verify.ps1</text>
  <text class="tiny" x="772" y="568">release gate input</text>

  <rect class="panel" x="1015" y="120" width="230" height="500" />
  <text class="text" x="1040" y="158">Outputs</text>
  <rect class="output" x="1040" y="185" width="175" height="96" />
  <text class="small" x="1060" y="215">SUMMARY.md</text>
  <text class="tiny" x="1060" y="239">counts by target</text>
  <text class="tiny" x="1060" y="261">ok / missing</text>
  <rect class="output" x="1040" y="306" width="175" height="108" />
  <text class="small" x="1060" y="336">REVERSE.md</text>
  <text class="tiny" x="1060" y="360">pressure maps</text>
  <text class="tiny" x="1060" y="382">hotspots</text>
  <text class="tiny" x="1060" y="402">gates</text>
  <rect class="output" x="1040" y="438" width="175" height="112" />
  <text class="small" x="1060" y="468">CONTRACT.md</text>
  <text class="tiny" x="1060" y="492">Kernel/Compiler</text>
  <text class="tiny" x="1060" y="514">Adam / LoseThos</text>
  <text class="tiny" x="1060" y="536">source-contract</text>

  <rect class="panel" x="365" y="650" width="880" height="70" />
  <text class="text" x="390" y="690">Oracle lab stays separate: seeded random text, voice skins, no prophecy claims.</text>

  <path class="line" d="M320 350 C340 350 350 350 365 350" />
  <path class="line" d="M675 350 C695 350 700 350 720 350" />
  <path class="line" d="M970 350 C990 350 1000 350 1015 350" />
  <path class="dashed" d="M845 580 C845 640 720 662 650 662" />
</svg>
