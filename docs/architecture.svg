<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">DBYTE HOLYC TOOLS VGA architecture map</title>
  <desc id="desc">Hand-authored 16-color VGA style architecture diagram for the read-only HolyC archaeology toolchain. No AI-generated art.</desc>
  <defs>
    <style>
      .bg { fill: #0000aa; }
      .screen { fill: #000000; stroke: #aaaaaa; stroke-width: 4; }
      .grid { stroke: #000055; stroke-width: 1; }
      .box-blue { fill: #0000aa; stroke: #ffffff; stroke-width: 3; }
      .box-cyan { fill: #00aaaa; stroke: #ffffff; stroke-width: 3; }
      .box-green { fill: #00aa00; stroke: #ffffff; stroke-width: 3; }
      .box-red { fill: #aa0000; stroke: #ffffff; stroke-width: 3; }
      .box-magenta { fill: #aa00aa; stroke: #ffffff; stroke-width: 3; }
      .box-brown { fill: #aa5500; stroke: #ffffff; stroke-width: 3; }
      .box-gray { fill: #555555; stroke: #ffffff; stroke-width: 3; }
      .box-black { fill: #000000; stroke: #ffffff; stroke-width: 3; }
      .wire { stroke: #ffff55; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .wire2 { stroke: #55ffff; stroke-width: 3; fill: none; marker-end: url(#arrow2); }
      .txt { fill: #ffffff; font-family: Consolas, 'Courier New', monospace; font-size: 21px; font-weight: 700; }
      .tiny { fill: #ffff55; font-family: Consolas, 'Courier New', monospace; font-size: 15px; font-weight: 700; }
      .cyan { fill: #55ffff; }
      .yellow { fill: #ffff55; }
      .green { fill: #55ff55; }
      .red { fill: #ff5555; }
      .shadow { fill: #555555; }
    </style>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="11" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,8 L12,4 z" fill="#ffff55" />
    </marker>
    <marker id="arrow2" markerWidth="12" markerHeight="12" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#55ffff" />
    </marker>
  </defs>

